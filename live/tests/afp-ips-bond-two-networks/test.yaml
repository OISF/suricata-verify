# Port of qa/live/netns/afp-ips-netns-bond-bridge2.sh.
environment: inline

topology:
  mtu: 9000
  networks:
    - client: 10.200.0.2/24
      server: 10.200.0.1/24
      bond: true
      bond-mode: balance-rr
    - client: 10.200.1.2/24
      server: 10.200.1.1/24
      bond: true
      bond-mode: balance-rr

requires:
  command:
    - curl
    - grep
    - hping3
    - jq
    - ping
    - python3
    - tcpdump
    - wc
    - wget

args:
  - --af-packet
  - --runmode=workers

server: |
  cleanup() {
    kill "${http0:-}" "${http1:-}" "${capture0:-}" "${capture1:-}" 2>/dev/null || true
    wait 2>/dev/null || true
  }
  trap cleanup EXIT INT TERM

  ip netns exec server0 tcpdump -U -n -i server -w ${OUTDIR}/server0.pcap icmp &
  capture0=$!
  ip netns exec server1 tcpdump -U -n -i server -w ${OUTDIR}/server1.pcap icmp &
  capture1=$!
  ip netns exec server0 python3 -m http.server 8000 --bind 10.200.0.1 &
  http0=$!
  ip netns exec server1 python3 -m http.server 8000 --bind 10.200.1.1 &
  http1=$!
  wait

client: |
  errors=no

  for endpoint in 10.200.0.1 10.200.1.1; do
    echo "Checking HTTP on ${endpoint}"
    if ! ip netns exec client$([ "${endpoint}" = 10.200.0.1 ] && echo 0 || echo 1) \
        curl --retry 10 --retry-connrefused --retry-delay 1 -fsS \
        http://${endpoint}:8000/ -o /dev/null; then
      echo "error: HTTP should have succeeded on ${endpoint}"
      errors=yes
    fi
  done

  echo "Checking HTTP with wget on network 0"
  if ! ip netns exec client0 wget -qO /dev/null http://10.200.0.1:8000/; then
    echo "error: wget should have succeeded on network 0"
    errors=yes
  fi

  echo "Sending fragmented ICMP on network 0"
  hping_output=$(ip netns exec client0 hping3 -c 10 -1 -f -d 15000 \
      10.200.0.1 2>&1) || true
  echo "${hping_output}"
  if ! grep -Eq '0 packets received|100% packet loss' <<<"${hping_output}"; then
    echo "error: fragmented ICMP should have been dropped"
    errors=yes
  fi

  echo "Sending ordinary ICMP on network 1"
  if ip netns exec client1 ping -c 10 -i 0.2 -W 1 10.200.1.1; then
    echo "error: ordinary ICMP should have been dropped"
    errors=yes
  fi

  test "${errors}" = no

checks:
  - stats:
      capture.kernel_packets.__gt: 0
      ips.accepted.__gt: 0
      ips.blocked.__gte: 10

  - shell:
      args: |
        http0=$(jq -c 'select(.event_type == "http" and .src_ip == "10.200.0.2")' eve.json | wc -l)
        http1=$(jq -c 'select(.event_type == "http" and .src_ip == "10.200.1.2")' eve.json | wc -l)
        hping_drops=$(jq -c 'select(.event_type == "drop" and .src_ip == "10.200.0.2")' eve.json | wc -l)
        ping_drops=$(jq -c 'select(.event_type == "drop" and .src_ip == "10.200.1.2")' eve.json | wc -l)
        test "${http0}" -ge 1
        test "${http1}" -ge 1
        test "${hping_drops}" -ge 20
        test "${ping_drops}" -ge 10

  - shell:
      args: |
        server0_echo=$(tcpdump -nn -r server0.pcap 'icmp[0] = 8' 2>/dev/null | wc -l)
        server1_echo=$(tcpdump -nn -r server1.pcap 'icmp[0] = 8' 2>/dev/null | wc -l)
        test "${server0_echo}" -eq 0
        test "${server1_echo}" -eq 0
