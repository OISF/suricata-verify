# Port of qa/live/pcap.sh single.
environment: tap

requires:
  command:
    - jq
    - ping

args:
  - --pcap=br0
  - --runmode single
  - --set pcap.bpf-filter=icmp

before: |
  cp ${TESTDIR}/icmp.rules ${OUTDIR}/suricata.rules

client: |
  EXPECTED_RUNMODE=single exec bash ${TESTDIR}/client.sh

checks:
  - stats:
      capture.kernel_packets.__gt: 0
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 222
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
