# DPDK IDS conversion of afp-ids-tpacket2-workers.
environment: tap

requires:
  command:
    - jq
    - ping
  features:
    - DPDK

args:
  - --dpdk
  - --runmode workers

before: |
  cp ${TESTDIR}/icmp.rules ${OUTDIR}/suricata.rules

client: |
  EXPECTED_CAPTURE_MODE=DPDK EXPECTED_RUNMODE=workers exec bash ${TESTDIR}/client.sh

checks:
  - stats:
      capture.packets.__gt: 0
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 222
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
