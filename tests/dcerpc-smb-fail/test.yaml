pcap: ../bug-5162/input.pcap

args:
- -k none

checks:
- filter:
    requires:
      min-version: 9
    # dcerpc.ptype support creates a tx (and thus a dcerpc event) for
    # otherwise-unhandled header-only PDU types, e.g. the AUTH3 in this pcap.
    count: 1451
    match:
      event_type: dcerpc
- filter:
    requires:
      min-version: 8.0.5
      lt-version: 9
    count: 1450
    match:
      event_type: dcerpc
- filter:
    requires:
      lt-version: 8.0.5
    count: 1445
    match:
      event_type: dcerpc
- filter:
    count: 22
    match:
      event_type: smb
- filter:
    count: 4
    match:
      event_type: dns
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 2
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 3
- filter:
    count: 11
    match:
      event_type: flow
- filter:
    count: 1
    match:
      event_type: stats
