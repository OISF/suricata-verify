requires:
  min-version: 9
args:
- -k none
- --set stream.midstream=true
- --set stream.async-oneside=true

checks:
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 3
  - filter:
      count: 1
      match:
        event_type: stats
        stats.tcp.async_stream: 1
        stats.tcp.midstream_pickups: 1
        stats.flow.tcp: 1
