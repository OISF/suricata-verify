requires:
  min-version: 9

pcap: input.pcap

checks:
  # Message 1: alice -> bob.
  - filter:
      count: 1
      match:
        event_type: smtp
        tx_id: 0
        smtp.mail_from: <alice@example.com>
        smtp.rcpt_to[0]: <bob@example.com>
        email.from: alice@example.com
        email.to[0]: bob@example.com
        not-has-key: ["smtp.rcpt_to[1]", "email.to[1]"]
        email.status: PARSE_DONE

  # Message 2: bob -> alice.
  - filter:
      count: 1
      match:
        event_type: smtp
        tx_id: 1
        smtp.mail_from: <bob@example.com>
        smtp.rcpt_to[0]: <alice@example.com>
        email.from: bob@example.com
        email.to[0]: alice@example.com
        not-has-key: ["smtp.rcpt_to[1]", "email.to[1]"]
        email.status: PARSE_DONE

  - filter:
      count: 0
      match:
        event_type: anomaly
