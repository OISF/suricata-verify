requires:
  min-version: 9

pcap: false

args:
  - --engine-analysis

checks:
  - filter:
      count: 1
      match:
        log_level: Warning
        engine.message: "inconsequential flowbit command combination in the same signature: isnotset and unset, skipping set/unset from matching logic for flowbit 'fb1' in sid: 111"
  # only the isnotset check survives; the inconsequential unset is dropped
  - filter:
      filename: rules.json
      count: 1
      match:
        id: 111
        lists.packet.matches[0].name: flowbits
        lists.packet.matches[0].flowbits.cmd: isnotset
        lists.packet.matches[0].flowbits.names[0]: fb1
        not-has-key: lists.postmatch
