requires:
  min-version: 8.0.6

pcap: ../../ftp/ftp-too-long-response/ftp-too-long-response.pcap

checks:

# every request has a response -> no alert
  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 1

  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 2
