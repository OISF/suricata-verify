requires:
   version: 9

args:
- -k none
- --set app-layer.protocols.pop3.detection-ports.dp="[110,993]"
- --set app-layer.protocols.sslproxy.enabled=true
  #- --simulate-ips

checks:
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: CAPA
      pop3.response.data[0]: USER
      pop3.response.data[1]: RESP-CODES
      pop3.response.data[2]: EXPIRE 0
      pop3.response.data[3]: LOGIN-DELAY 300
      pop3.response.data[4]: TOP
      pop3.response.data[5]: UIDL
      pop3.response.data[6]: X-GOOGLE-RICO
      pop3.response.data[7]: SASL PLAIN XOAUTH2 OAUTHBEARER
      pop3.response.header: Capability list follows
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.args[0]: XOAUTH2
      pop3.request.command: AUTH
      pop3.response.header: ''
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: <SASL DATA>
      pop3.response.header: Welcome.
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: STAT
      pop3.response.header: 1 308661
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: LIST
      pop3.response.data[0]: 1 308661
      pop3.response.header: 1 messages (308661 bytes)
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: UIDL
      pop3.response.data[0]: 1 GmailId123456789
      pop3.response.header: ''
      pop3.response.status: OK
      pop3.response.success: true
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      dest_ip: 2.2.2.2
      dest_port: 993
      event_type: pop3
      ip_v: 4
      pop3.request.command: QUIT
      proto: TCP
      src_ip: 1.1.1.1
      src_port: 5555
- filter:
    count: 1
    match:
      event_type: flow
      app_proto: pop3
      app_proto_orig: sslproxy
      src_ip: 1.1.1.1
      src_port: 5555
      dest_ip: 2.2.2.2
      dest_port: 993
