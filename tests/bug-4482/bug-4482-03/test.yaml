requires:
  min-version: 9

args:
- --set app-layer.protocols.http.libhtp.default-config.swf-decompression.enabled=yes

checks:
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2

  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.event: file.INVALID_SWF_VERSION
