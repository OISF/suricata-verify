pcap: ../bug-3616-smtp/input.pcap

requires:
  min-version: 8.0.0

checks:
# Pre-9 creates/logs a trailing QUIT transaction with inherited HELO,
# causing a second HELO alert.
- filter:
    requires:
      lt-version: 9.0
    count: 2
    match:
      event_type: alert
      smtp.helo: GP
      alert.signature_id: 1
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: alert
      smtp.helo: GP
      alert.signature_id: 1
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 10
- filter:
    count: 1
    match:
      event_type: alert
      smtp.mail_from: "<gurpartap@patriots.in>"
      alert.signature_id: 2
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 12
- filter:
    count: 1
    match:
      event_type: alert
      smtp.rcpt_to[0]: "<raj_deol2002in@yahoo.co.in>"
      alert.signature_id: 3
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 13