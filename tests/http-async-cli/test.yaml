# disables checksum verification
args:
  - -k none
  - --set stream.async-oneside=true

checks:

  # Check that there is one file event with content range.
  - filter:
      count: 1
      match:
        event_type: http
        http.url: "/1"
  - filter:
      count: 1
      match:
        event_type: http
        http.url: "/2"
  - filter:
      requires:
        min-version: 9
      count: 1
      match:
        event_type: stats
        stats.flow.total: 1
        stats.tcp.async_stream: 1
