      count: 4
      match:
        event_type: alert
        alert.signature_id: 10
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 11
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 20
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 21
  # matches request and response
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 22
  # matches request and response
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 23
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 30
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 31
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 40
        http.version: "2"
        dns.queries[0].rrname : "nav-edge.smartscreen.microsoft.com"
  - filter:
      count: 2
