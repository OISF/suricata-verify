# disables checksum verification
args:
  - -k none --set stream.midstream=true

checks:

# checks for http.uri keyword : 1 for HTTP1, 1 for mimicked HTTP2 response, so 2 for whole HTTP
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 10
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 11
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 12
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 20
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 21
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 30
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 31
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 32
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 33
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 34
  - filter:
      requires:
        lt-version: 9
      count: 12
      match:
        event_type: alert
        alert.signature_id: 35
  - filter:
      requires:
        min-version: 9
      # In 9, we match only once for global tx instead of for each direction
      # TODO currently matching only on stream type
      count: 4
      match:
        event_type: alert
        alert.signature_id: 35
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 36
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 37
  - filter:
      requires:
        lt-version: 9
      count: 6
      match:
        event_type: alert
        alert.signature_id: 38
  - filter:
      # TODO currently matching only on stream type
      requires:
        min-version: 9
      count: 2
      match:
        event_type: alert
        alert.signature_id: 38
  - filter:
      requires:
        lt-version: 9
      count: 6
      match:
        event_type: alert
        alert.signature_id: 39
  - filter:
      # TODO currently matching only on stream type
      requires:
        min-version: 9
      count: 2
      match:
        event_type: alert
        alert.signature_id: 39
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 40
