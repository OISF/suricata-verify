pcap: ../windows-pe-basic/multi_pe.pcap

requires:
  min-version: 9

args:
- -k none

checks:
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 80
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 81
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 82
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 83

# Verify dll_characteristics and security_features are correctly logged in fileinfo events
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.dll_characteristics: 34048
- filter:
    count: 5
    match:
      event_type: fileinfo
      has-key: executable.security_features
