pcap: ../windows-pe-basic/multi_pe.pcap

requires:
  min-version: 9

args:
- -k none

checks:
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 2
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 3

# Verify pe_type is logged
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.pe_type: PE32
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.magic: 267
