requires:
  min-version: 8

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 100
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 101
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 999
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 102
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 104
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 105
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 106
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 201
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 202
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 203
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 204
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 205
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 206
- filter:
    requires:
      lt-version: 9
    count: 1
    match:
      event_type: drop
      alert.signature_id: 999
      drop.reason: "rules"
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: drop
      alert.signature_id: 999
      drop.reason: "firewall rules"
- filter:
    count: 6
    match:
      event_type: drop
      drop.reason: "flow drop"
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 6
      flow.pkts_toclient: 4
      flow.state: "established"
      flow.alerted: true
      flow.action: drop
- filter:
    requires:
      lt-version: 9
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 3
      stats.ips.blocked: 7
      stats.ips.drop_reason.rules: 1
      stats.ips.drop_reason.flow_drop: 6
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 3
      stats.ips.blocked: 7
      stats.ips.drop_reason.firewall.rules: 1
      stats.ips.drop_reason.flow_drop: 6
      stats.detect.firewall.discarded_alerts: 5
