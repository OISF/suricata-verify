requires:
  min-version: 8.0.6

pcap: ../../ftp/ftp-download-active/input.pcap

args:
  - --simulate-ips
  - --runmode=single

checks:

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2000

  # We should see no ftp_data as we dropped before RETR, NLST.
  - filter:
      count: 0
      match:
        event_type: ftp_data

  - filter:
      count: 26
      match:
        event_type: drop
