requires:
  min-version: 8

pcap: ../../tls/tls-random/input.pcap

args:
  - --simulate-ips

checks:
- filter:
    count: 13
    match:
      event_type: alert
      alert.signature_id: 2
      verdict.action: drop
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 13
    match:
      event_type: drop
      alert.signature_id: 2
      verdict.action: drop
- filter:
    count: 0
    match:
      event_type: tls
- filter:
    count: 0
    match:
      event_type: flow
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 0
      stats.ips.blocked: 13
      stats.ips.drop_reason.firewall.default_packet_policy: 0
      stats.ips.drop_reason.firewall.pre_flow_hook: 13
      stats.ips.drop_reason.firewall.rules: 0
      stats.detect.firewall.discarded_alerts: 0
