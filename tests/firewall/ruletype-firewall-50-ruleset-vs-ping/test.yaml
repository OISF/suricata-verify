requires:
  min-version: 8

args:
  - --simulate-ips

checks:
- filter:
    count: 1
    match:
      pcap_cnt: 1
      event_type: alert
      alert.signature_id: 101
      icmp_type: 8
      icmp_code: 0
- filter:
    count: 1
    match:
      pcap_cnt: 3
      event_type: alert
      alert.signature_id: 102
      icmp_type: 0
      icmp_code: 0
- filter:
    count: 1
    match:
      pcap_cnt: 2
      event_type: drop
      icmp_type: 8
      icmp_code: 1
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 1
      flow.pkts_toclient: 1
      flow.state: "established"
      flow.alerted: true
