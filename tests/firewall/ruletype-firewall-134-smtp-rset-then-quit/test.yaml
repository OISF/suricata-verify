requires:
  min-version: 9

pcap: smtp-rset-then-quit.pcap

args:
  - --simulate-ips

checks:
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1998
        smtp.mail_from: <alice@example.com>

  # The RSET-aborted envelope is logged; no message body was sent.
  - filter:
      count: 1
      match:
        event_type: smtp
        smtp.mail_from: <alice@example.com>
        smtp.rcpt_to[0]: <bob@example.com>

  - filter:
      count: 0
      match:
        event_type: drop

  - stats:
      firewall.accepted: 19
      firewall.blocked: 0
