%YAML 1.1
---

stats:
  enabled: yes
  interval: 8

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - stats
        - alert
        - flow
        - smtp:
            extended: true
        - files
        - anomaly
        - drop:
            alerts: yes
            flows: all
