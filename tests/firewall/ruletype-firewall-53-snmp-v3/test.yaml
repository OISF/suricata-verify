requires:
  min-version: 9

pcap: ../../snmp-v3-unauth/snmp-v3-get-bulk-unauth.pcap

args:
  - --simulate-ips

checks:
- filter:
    count: 8
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 3
    match:
      event_type: alert
      alert.signature_id: 12
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 13
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 22
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 23
- filter:
    count: 2
    match:
      event_type: flow
      flow.pkts_toserver: 2
      flow.pkts_toclient: 2
      flow.state: "established"
      flow.alerted: true
