requires:
  min-version: 8.0.4

args:
  - --simulate-ips
  - --set reputation-categories-file=${TEST_DIR}/categories.txt
  - --set reputation-files.0=${TEST_DIR}/iprep.list

checks:
- filter:
    count: 1
    match:
      event_type: alert
- filter:
    count: 7
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: drop
      pcap_cnt: 4
- filter:
    count: 1
    match:
      event_type: flow
      dest_ip: 82.165.177.154
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 3
      stats.ips.blocked: 0
      stats.firewall.accepted: 3
      stats.firewall.blocked: 7
      stats.firewall.drop_reason.rules: 1
      stats.firewall.drop_reason.flow_drop: 6
