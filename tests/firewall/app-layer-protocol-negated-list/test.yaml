requires:
  min-version: 9

pcap: input.pcap

args:
  - --simulate-ips
  - -k none

checks:
  - filter:
      count: 1
      match:
        event_type: stats
        stats.detect.engines[0].rules_loaded: 6
        stats.detect.engines[0].rules_failed: 0

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 9001

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 9002

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 9003

  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 9004

  - filter:
      count: 0
      match:
        event_type: drop

  - filter:
      count: 1
      match:
        event_type: flow
        app_proto: tls

  - filter:
      count: 1
      match:
        event_type: flow
        app_proto: dns

  - filter:
      count: 1
      match:
        event_type: flow
        app_proto: http
