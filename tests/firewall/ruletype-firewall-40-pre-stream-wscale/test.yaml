requires:
  min-version: 8

pcap: ../../tls/tls-random/input.pcap

args:
  - --simulate-ips

checks:
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 2
      verdict.action: drop
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 13
    match:
      event_type: drop
- filter:
    count: 0
    match:
      event_type: tls
- filter:
    count: 1
    match:
      event_type: flow
      flow.state: new
      tcp.tcp_flags: "00"
      flow.alerted: true
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 0
      stats.ips.blocked: 12
      stats.firewall.accepted: 12
      stats.firewall.blocked: 1
      stats.ips.drop_reason.stream_midstream: 1
      stats.firewall.drop_reason.pre_stream_hook: 1
      stats.firewall.drop_reason.default_packet_policy: 0
      # TODO add check for drop reason exception policy flow drop?
