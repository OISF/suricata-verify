requires:
  min-version: 9

pcap: ../ruletype-firewall-125-smtp-all-rcpts-required-drop/two-rcpt.pcap

args:
  - --simulate-ips
  - -k none

checks:
  # Check that MAIL FROM was accepted.
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1998
        smtp.mail_from: <alice@example.com>

  # Check that the allowed RCPT TO was accepted.
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1999
        smtp.rcpt_to[0]: <bob@example.com>
        smtp.rcpt_to[1]: <alice@example.com>

  # Check that the full SMTP transaction completed.
  - filter:
      count: 1
      match:
        event_type: smtp
        smtp.mail_from: <alice@example.com>
        smtp.rcpt_to[0]: <bob@example.com>
        smtp.rcpt_to[1]: <alice@example.com>

  # The full connection should be accepted.
  - filter:
      count: 0
      match:
        event_type: drop

  - filter:
      count: 1
      match:
        event_type: flow
        not-has-key: flow.action

  - stats:
      firewall.accepted: 24
      firewall.blocked: 0
