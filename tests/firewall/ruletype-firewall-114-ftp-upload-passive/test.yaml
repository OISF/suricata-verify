requires:
  min-version: 9

pcap: ../../ftp/ftp-upload-passive/input.pcap

args:
  - --simulate-ips
  - --runmode=single

checks:

  - filter:
      count: 1
      match:
        event_type: ftp_data
        ftp_data.command: STOR

  # ftpdata_command: stor matches in ftp-data:request_started
  - filter:
      count: 1
      match:
        alert.signature_id: 4000

  - filter:
      count: 1
      match:
        alert.signature_id: 4010

  # ftp-data:response_started never reach in passive upload mode
  - filter:
      count: 0
      match:
        alert.signature_id: 5000

  # ftp-data:response_completed never reach in passive upload mode
  - filter:
      count: 0
      match:
        alert.signature_id: 5010

  - filter:
      count: 1
      match:
        event_type: fileinfo
