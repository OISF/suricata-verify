requires:
  min-version: 9

pcap: ../../tls/tls-client-hello-frag-01/dump_mtu300.pcap

args:
  - --simulate-ips
  - -k none

checks:
# no match due to pass:flow in 1024
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 666
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1023
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1021
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1024
# no drops due to no match of 666
- filter:
    count: 0
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 32
      flow.pkts_toclient: 30
      flow.state: "closed"
      flow.alerted: false
      flow.action: "accept"
- filter:
    count: 1
    match:
      event_type: stats
      stats.firewall.accepted: 62
      stats.firewall.blocked: 0
      stats.firewall.drop_reason.default_app_policy: 0
      stats.firewall.drop_reason.rules: 0
      stats.ips.accepted: 62
      stats.ips.blocked: 0
      stats.ips.drop_reason.rules: 0
