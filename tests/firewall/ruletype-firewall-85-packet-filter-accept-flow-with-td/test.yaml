requires:
  min-version: 9

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    # Should see this rule fire once, but it currenty being bypassed.
    count: 1
    match:
      event_type: alert
      alert.signature_id: 100001
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 0
