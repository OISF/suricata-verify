requires:
  min-version: 8.0.5

pcap: ../../ntp-keywords/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 1
        alert.engine: fw
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 13
        alert.engine: fw
        ntp.version: 4
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 14
        alert.engine: fw
        ntp.version: 3

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 21
        alert.engine: fw
        ntp.version: 4

  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 22

  - filter:
      count: 1
      match:
        event_type: drop
        pcap_cnt: 4

  - stats:
      ips.accepted: 3
      ips.blocked: 1
