%YAML 1.1
---


default-log-dir: .

vars:
  address-groups:
    HOME_NET: "[192.0.2.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
  port-groups:
    HTTP_PORTS: "80"
    SSH_PORTS: "22"
    SHELLCODE_PORTS: "!80"

firewall: true

stream:
  midstream: false
  midstream-policy: drop-flow

outputs:
  - fast:
      enabled: yes
      filename: fast.log
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            tagged-packets: no
            metadata: no
        - drop:
            alerts: yes
            flows: all
        - flow
        - anomaly:
            types:
              stream: yes
              applayer: no
              decode: no
        - stats:
            totals: yes
            threads: no
            deltas: no

logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes

action-order:
  - pass
  - drop
  - reject
  - alert
