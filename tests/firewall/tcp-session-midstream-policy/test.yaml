requires:
  min-version: 9

pcap: input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 1
    match:
      event_type: stats
      stats.detect.engines[0].rules_loaded: 1
      stats.detect.engines[0].rules_failed: 0

- filter:
    count: 1
    match:
      event_type: drop
      drop.reason: "stream midstream"

- filter:
    count: 1
    match:
      event_type: flow
      flow.action: drop

- filter:
    count: 3
    match:
      event_type: drop

- filter:
    count: 2
    match:
      event_type: drop
      drop.reason: "exception policy flow drop"

- filter:
    count: 0
    match:
      event_type: http

- filter:
    count: 1
    match:
      event_type: stats
      stats.exception_policy.tcp.midstream.drop_flow: 1

- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.drop_reason.stream_midstream: 1

- filter:
    count: 0
    match:
      event_type: alert
