requires:
  min-version: 8.0.6

pcap: ../../tls/tls-client-hello-frag-01/dump_mtu300.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 666
      pcap_cnt: 6
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1023
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1021
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 104
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 105
      pcap_cnt: 4
- filter:
    count: 57
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: drop
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 32
      flow.pkts_toclient: 30
      flow.state: "established"
      flow.alerted: true
      flow.action: "drop"
- filter:
    count: 1
    match:
      event_type: stats
      stats.firewall.accepted: 62
      stats.firewall.blocked: 0
      stats.firewall.drop_reason.default_app_policy: 0
      stats.firewall.drop_reason.rules: 0
      stats.ips.accepted: 5
      stats.ips.blocked: 57
      stats.ips.drop_reason.rules: 1
      stats.ips.drop_reason.flow_drop: 56
