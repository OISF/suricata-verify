requires:
  min-version: 9

pcap: input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 1
    match:
      event_type: stats
      stats.detect.engines[0].rules_loaded: 1
      stats.detect.engines[0].rules_failed: 0

- filter:
    count: 1
    match:
      event_type: anomaly
      anomaly.type: decode
      anomaly.event: decoder.ipv6.exthdr_useless_fh

- filter:
    count: 1
    match:
      event_type: stats
      stats.decoder.event.ipv6.exthdr_useless_fh: 1

- filter:
    count: 1
    match:
      event_type: stats
      stats.decoder.ipv6: 8

- filter:
    count: 0
    match:
      event_type: drop

- filter:
    count: 1
    match:
      event_type: flow
      proto: TCP
      ip_v: 6
      flow.state: closed
      flow.action: accept

- filter:
    count: 1
    match:
      event_type: stats
      stats.firewall.blocked: 0

- filter:
    count: 0
    match:
      event_type: alert
