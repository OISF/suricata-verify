%YAML 1.1
---


default-log-dir: .

vars:
  address-groups:
    HOME_NET: "any"
    EXTERNAL_NET: "any"
    HTTP_SERVERS: "$EXTERNAL_NET"
    SMTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    AIM_SERVERS: "$EXTERNAL_NET"
  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"
    SSH_PORTS: "22"
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS: "21"

firewall:
  enabled: yes

app-layer:
  protocols:
    tls:
      enabled: yes
      detection-ports:
        dp: 443

stats:
  enabled: yes
  interval: 8

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            tagged-packets: no
            metadata: no
        - drop:
            alerts: yes
            flows: all
        - flow
        - stats:
            totals: yes
            threads: no
            deltas: no

logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes

action-order:
  - pass
  - drop
  - reject
  - alert
