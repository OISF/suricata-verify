requires:
  min-version: 9

pcap: input.pcap

args:
  - --simulate-ips
  - -k none

checks:
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 5002
        alert.action: blocked
        alert.engine: fw
        pcap_cnt: 4
  - filter:
      count: 1
      match:
        event_type: drop
        pcap_cnt: 4
  - stats:
      ips.blocked: 7
