requires:
  min-version: 9

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 100
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 9998
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 9999
- filter:
    count: 0
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 6
      flow.pkts_toclient: 4
      flow.state: "closed"
      flow.alerted: true
      not-has-key: flow.action
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 0
