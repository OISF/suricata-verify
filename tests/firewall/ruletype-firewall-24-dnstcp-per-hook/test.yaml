requires:
  min-version: 8

pcap: ../../dns/dns-frames/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 100
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 101
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 102
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 201
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 202
- filter:
    count: 2
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 6
      flow.pkts_toclient: 4
      flow.alerted: true
      not-has-key: flow.action
- filter:
    requires:
      lt-version: 9
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 2
      stats.ips.drop_reason.default_packet_policy: 2
      stats.ips.drop_reason.default_app_policy: 0
      stats.ips.drop_reason.rules: 0
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 2
      stats.ips.drop_reason.firewall.default_packet_policy: 2
      stats.ips.drop_reason.firewall.default_app_policy: 0
      stats.ips.drop_reason.firewall.rules: 0
      stats.detect.firewall.discarded_alerts: 0
