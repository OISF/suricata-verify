requires:
  min-version: 9

pcap: ../ruletype-firewall-54-snmp-v1-trap/public-wiresharkwiki-c06-snmpv1-trap-app-r1-1-12.pcap

args:
  - --simulate-ips

checks:
- filter:
    count: 6
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 12
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 13
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 14
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 15
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 16
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 12
      flow.pkts_toclient: 0
      flow.state: "new"
      flow.alerted: true
- filter:
    count: 1
    match:
      event_type: stats
      stats.app_layer.error.snmp.parser: 0
      stats.ips.drop_reason.default_app_policy: 1
