requires:
  min-version: 8

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 100
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 101
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 102
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 103
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 104
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 105
# no match due to accept:tx policy
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 106
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 201
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 202
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 203
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 204
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 205
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 206
- filter:
    count: 0
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 6
      flow.pkts_toclient: 4
      flow.state: "closed"
      flow.alerted: true
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 0
      stats.ips.drop_reason.default_app_policy: 0
      stats.ips.drop_reason.flow_drop: 0
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 5000
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 2100498
