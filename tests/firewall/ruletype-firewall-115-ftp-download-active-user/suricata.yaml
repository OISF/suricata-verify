%YAML 1.1
---

stats:
  enabled: yes
  interval: 8

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - flow
        - alert
        - ftp
        - files
        - drop:
            alerts: yes
            flows: all

firewall:
  policies:
    ftp-data:
      request-started:
        - "accept:flow"
      response-started:
        - "accept:flow"
