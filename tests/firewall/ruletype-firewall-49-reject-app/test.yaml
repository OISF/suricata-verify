requires:
  min-version: 8
  features:
    - LIBNET1.1

pcap: ../../tls/tls-client-hello-frag-01/dump_mtu300.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 1023
      alert.action: allowed
      pcap_cnt: 6
      verdict.action: drop
- filter:
    count: 3
    match:
      event_type: alert
      pcap_cnt: 6
      verdict.action: drop
- filter:
    count: 3
    match:
      event_type: alert
      alert.signature_id: 1021
      verdict.action: accept
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 1022
- filter:
    count: 3
    match:
      event_type: alert
      alert.signature_id: 1023
# packet rule accepted, also accepted at app layer
- filter:
    count: 2
    match:
      event_type: alert
      alert.signature_id: 1023
      verdict.action: accept
# packet rule accepted, dropped at app layer
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 1023
      verdict.action: drop
# count all records with verdict field
- filter:
    count: 6
    match:
      verdict.action: accept
# count all records with verdict field
- filter:
    count: 60
    match:
      verdict.action: drop
- filter:
    requires:
      min-version: 9
    count: 4
    match:
      verdict.action: drop
      verdict.reject_target: to_client
      verdict.reject[0]: tcp-reset
- filter:
    requires:
      lt-version: 9
    count: 4
    match:
      verdict.action: drop
      verdict.reject-target: to_client
      verdict.reject[0]: tcp-reset
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 32
      flow.pkts_toclient: 30
      flow.state: "established"
      flow.alerted: true
      flow.action: drop
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 5
      stats.ips.rejected: 1
      stats.ips.blocked: 56
      stats.ips.drop_reason.default_app_policy: 0
      stats.ips.drop_reason.rules: 1
      stats.ips.drop_reason.flow_drop: 56
