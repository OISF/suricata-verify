requires:
  min-version: 8.0.6

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:

# We should see the default policy alert.
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 2201001

# The HTTP transaction should still be logged.
- filter:
    count: 1
    match:
      event_type: http
