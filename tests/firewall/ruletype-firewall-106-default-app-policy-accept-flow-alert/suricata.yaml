%YAML 1.1
---

stats:
  enabled: yes
  interval: 8

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - stats
        - alert
        - flow
        - http
        - drop:
            alerts: yes
            flows: all

firewall:
  policies:
    packet-filter: ["accept:hook"]
    http:
      request-started: ["accept:flow", "alert"]
