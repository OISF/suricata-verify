requires:
  min-version: 9

pcap: ../../snmp-v2c-get/SNMPv2c_get_requests.pcap

args:
  - --simulate-ips

checks:
- filter:
    count: 8
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 3
    match:
      event_type: alert
      alert.signature_id: 12
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 13
- filter:
    count: 4
    match:
      event_type: alert
      alert.signature_id: 22
- filter:
    count: 4
    match:
      event_type: flow
      flow.pkts_toserver: 1
      flow.pkts_toclient: 1
      flow.state: "established"
      flow.alerted: true
