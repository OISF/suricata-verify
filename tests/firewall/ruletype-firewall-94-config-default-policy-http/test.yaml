requires:
  min-version: 9

pcap: ../../flowbit-oring/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature: "SURICATA FW default app policy"
      alert.signature_id: 2201001
      firewall.hook: "http:request_started"
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature: "SURICATA FW default app policy"
      alert.signature_id: 2201001
      firewall.hook: "http:request_line"
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature: "SURICATA FW default app policy"
      alert.signature_id: 2201001
      firewall.hook: "http:request_headers"
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature: "SURICATA FW default app policy"
      alert.signature_id: 2201001
      firewall.hook: "http:request_body"
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature: "SURICATA FW default app policy"
      alert.signature_id: 2201001
      firewall.hook: "http:request_trailer"
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 4
      alert.signature_id: 106
      alert.signature: "rule accept:hook for http:request_complete"
      firewall.hook: "http:request_complete"
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 100
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 101
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 102
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 103
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 104
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 105
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 106
      pcap_cnt: 4
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 201
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 202
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 203
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 204
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 205
      pcap_cnt: 6
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 206
      pcap_cnt: 6
- filter:
    count: 0
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: flow
      flow.pkts_toserver: 6
      flow.pkts_toclient: 4
      flow.state: "closed"
      flow.alerted: true
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.accepted: 10
      stats.ips.blocked: 0
      stats.firewall.accepted: 10
      stats.firewall.blocked: 0
