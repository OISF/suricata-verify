requires:
  min-version: 9

pcap: ../../imap/imap.pcap

args:
  - --simulate-ips
  - -k none
  - --set app-layer.protocols.imap.enabled=yes

checks:
  - filter:
      count: 0
      match:
        event_type: drop
  - filter:
      count: 12
      match:
        event_type: alert
        alert.signature_id: 4
  - filter:
      count: 14
      match:
        event_type: imap
  - filter:
      count: 1
      match:
        event_type: stats
        stats.firewall.blocked: 0
        stats.ips.accepted: 43
        stats.ips.blocked: 0
