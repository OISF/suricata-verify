requires:
  min-version: 8

pcap: ../../tls/tls-certs-alert/input.pcap

args:
  - --simulate-ips
  - -k none

checks:
# tls.cert_chain_len:3 matches the certificate chain
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 0
    match:
      event_type: drop
- filter:
    count: 1
    match:
      event_type: stats
      stats.ips.blocked: 0
