requires:
  min-version: 8.0.6

pcap: input.pcap

args:
  - --simulate-ips
  - -k none

checks:

- filter:
    count: 1
    match:
      event_type: drop
      pcap_cnt: 3
      drop.reason: "firewall default app policy"

- stats:
    firewall.blocked: 2
    firewall.accepted: 2

- filter:
    count: 1
    match:
      event_type: alert
      alert.signature: "SURICATA FW default app policy"


