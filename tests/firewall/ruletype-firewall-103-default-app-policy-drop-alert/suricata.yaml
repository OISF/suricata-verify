%YAML 1.1
---

stats:
  enabled: yes
  interval: 8

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - stats
        - alert
        - flow
        - dns
        - drop:
            flows: all

firewall:
  policies:
    dns:
      # Allow DNS requests to start.
      request-started: ["accept:hook"]

      # Drop and alert on all DNS requests that are not allowed in
      # firewall.rules.
      request-complete: ["drop:flow", "alert"]

      # Accept all responses.
      response-started: ["accept:flow"]
