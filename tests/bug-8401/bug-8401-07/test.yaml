requires:
  min-version: 9

args:
  - --runmode=single

checks:
  - filter:
      count: 8
      match:
        event_type: alert

  - filter:
      count: 1
      match:
        event_type: stats
        stats.detect.thresholds.entries: 4
        stats.detect.thresholds.nonempty_buckets: 2
        stats.detect.thresholds.max_bucket_depth: 3
        stats.detect.thresholds.avg_bucket_depth: 2
