requires:
  min-version: 9.0.0

args:
  - -k none

checks:
  - filter:
      count: 3
      match:
        event_type: llmnr
        proto: UDP
  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 3
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 4
  - filter:
      count: 1
      match:
        event_type: llmnr
        llmnr.type: "request"
        llmnr.queries[0].rrname: "malicious-c2.local"
  - filter:
      count: 1
      match:
        event_type: llmnr
        llmnr.type: "response"
        llmnr.queries[0].rrname: "malicious-c2.local"
  - filter:
      count: 1
      match:
        event_type: llmnr
        llmnr.type: response
        llmnr.answers[0].a: "10.10.10.10"
