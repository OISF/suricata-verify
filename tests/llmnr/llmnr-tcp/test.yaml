requires:
  min-version: 9.0.0

args:
  - -k none

checks:
  - filter:
      count: 2
      match:
        event_type: llmnr
        proto: TCP
  - filter:
      count: 1
      match:
        event_type: llmnr
        proto: TCP
        src_ip: 192.168.1.50
        src_port: 12345
        dest_ip: 192.168.1.100
        dest_port: 5355
        llmnr.type: request
        llmnr.id: 4660
        llmnr.opcode: 0
        llmnr.queries[0].rrname: workstation
        llmnr.queries[0].rrtype: a
  - filter:
      count: 1
      match:
        event_type: llmnr
        proto: TCP
        llmnr.type: response
        llmnr.id: 4660
        llmnr.queries[0].rrname: workstation
        llmnr.queries[0].rrtype: a
        llmnr.answers[0].rrname: workstation
        llmnr.answers[0].a: 192.168.1.100
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
