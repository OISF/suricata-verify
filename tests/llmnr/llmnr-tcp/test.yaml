requires:
  min-version: 8.0.0

args:
  - -k none

checks:
  - filter:
      count: 2
      match:
        event_type: llmnr
        proto: TCP
  - filter:
      count: 1
      match:
        event_type: llmnr
        proto: TCP
        src_ip: 192.168.1.50
        src_port: 12345
        dest_ip: 192.168.1.100
        dest_port: 5355
        llmnr.type: request
        llmnr.id: 4660
        llmnr.flags: "0"
        llmnr.opcode: 0
        llmnr.queries[0].rrname: workstation
        llmnr.queries[0].rrtype: A
  - filter:
      count: 1
      match:
        event_type: llmnr
        proto: TCP
        llmnr.type: response
        llmnr.id: 4660
        llmnr.flags: "8000"
        llmnr.queries[0].rrname: workstation
        llmnr.queries[0].rrtype: A
        llmnr.answers[0].rrname: workstation
        llmnr.answers[0].rrtype: A
        llmnr.answers[0].ttl: 1
        llmnr.answers[0].rdata: 192.168.1.100
        llmnr.grouped.A[0]: 192.168.1.100
