        llmnr.type: request
        llmnr.id: 49985
        llmnr.opcode: 0
        llmnr.queries[0].rrname: hs2011
        llmnr.queries[0].rrtype: a
  - filter:
      count: 1
      match:
        event_type: llmnr
        proto: UDP
        llmnr.type: response
        llmnr.id: 49985
        llmnr.queries[0].rrname: hs2011
        llmnr.queries[0].rrtype: a
        llmnr.answers[0].rrname: HS2011
        llmnr.answers[0].a: 192.168.10.101
