args:
- --set stream.async-oneside=true

checks:
  - filter:
      count: 2
      match:
        event_type: alert
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
  - filter:
      requires:
        min-version: 9
      count: 1
      match:
        event_type: stats
        stats.flow.total: 1
        stats.tcp.async_stream: 1



