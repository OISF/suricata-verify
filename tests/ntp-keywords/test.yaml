requires:
  min-version: 9

checks:
  - filter:
      # 4 NTP events.
      count: 4
      match:
        event_type: ntp

  - filter:
      # 2 NTP v3 events.
      count: 2
      match:
        event_type: ntp
        ntp.version: 3

  - filter:
      # 2 NTP v4 events.
      count: 2
      match:
        event_type: ntp
        ntp.version: 4

  - filter:
      # 2 NTP request events at stratum 0.
      count: 2
      match:
        event_type: ntp
        ntp.stratum: 0

  - filter:
      # 2 NTP reply events at stratum 2.
      count: 2
      match:
        event_type: ntp
        ntp.stratum: 2

  - filter:
      # 2 NTP client mode events.
      count: 2
      match:
        event_type: ntp
        ntp.mode: 3

  - filter:
      # 2 NTP server mode events.
      count: 2
      match:
        event_type: ntp
        ntp.mode: 4

  - filter:
      # 2 NTP events with a zero reference ID.
      count: 2
      match:
        event_type: ntp
        ntp.reference_id: "00:00:00:00"

  - filter:
      # 2 NTP events with a LOCL reference ID.
      count: 2
      match:
        event_type: ntp
        ntp.reference_id: "4c:4f:43:4c"

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 1

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 2

  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 3

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 4

  - filter:
      count: 4
      match:
        event_type: alert
        alert.signature_id: 5

  - filter:
      count: 2
      match:
        event_type: alert
        alert.signature_id: 6

  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 7

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 8

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 9

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 10

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 11

  - filter:
      # Should see stratum 0 on both requests.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 12

  - filter:
      # Should see stratum 2 on both replies.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 13

  - filter:
      # Should see no stratum greater than 2.
      count: 0
      match:
        event_type: alert
        alert.signature_id: 14

  - filter:
      # Should see only stratum values below 2 on requests.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 15

  - filter:
      # Should see stratum 2 on both reply events.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 16

  - filter:
      # Should see only replies with stratum greater than 0.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 17

  - filter:
      # Should see only requests with stratum less than 1.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 18

  - filter:
      # Should see stratum 0 only to_server.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 19

  - filter:
      # Should see stratum 2 only to_client.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 20

  - filter:
      # Should see no to_server with stratum 2.
      count: 0
      match:
        event_type: alert
        alert.signature_id: 21

  - filter:
      # Should see no to_client with stratum 0.
      count: 0
      match:
        event_type: alert
        alert.signature_id: 22

  - filter:
      # Should see both client mode packets.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 23
        ntp.mode: 3

  - filter:
      # Should see both server mode packets.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 24
        ntp.mode: 4

  - filter:
      # Numeric mode 3 should match both client packets.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 25
        ntp.mode: 3

  - filter:
      # Negated server mode should match only client packets.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 26
        ntp.mode: 3

  - filter:
      # Should see LOCL on both replies.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 27
        ntp.reference_id: "4c:4f:43:4c"

  - filter:
      # Should see a zero reference ID on both requests.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 28
        ntp.reference_id: "00:00:00:00"

  - filter:
      # LOCL should match only to_client.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 29
        ntp.reference_id: "4c:4f:43:4c"

  - filter:
      # Should see no to_server packets with LOCL.
      count: 0
      match:
        event_type: alert
        alert.signature_id: 30

  - filter:
      # Zero reference ID should match only to_server.
      count: 2
      match:
        event_type: alert
        alert.signature_id: 31
        ntp.reference_id: "00:00:00:00"

  - filter:
      # Should see no to_client packets with a zero reference ID.
      count: 0
      match:
        event_type: alert
        alert.signature_id: 32
