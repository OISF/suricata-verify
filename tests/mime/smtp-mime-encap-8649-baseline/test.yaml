# smtp-mime-encap-baseline

requires:
  min-version: 8.0.0

args:
  - -k none

checks:
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 9000100

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 9000101
        files[0].filename: malware.exe
        files[0].state: CLOSED

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 9000102
        files[0].filename: malware.exe

  - filter:
      count: 1
      match:
        event_type: fileinfo
        fileinfo.filename: malware.exe
        fileinfo.state: CLOSED
        fileinfo.size: 30
