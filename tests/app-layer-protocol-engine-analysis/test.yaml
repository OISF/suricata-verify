requires:
    min-version: 9
    pcap: false

args:
    - --engine-analysis

checks:
# single value
- filter:
    filename: rules.json
    count: 1
    match:
      id: 1
      lists.packet.matches[0].app_layer_protocol.protocols: "dns"
      lists.packet.matches[0].app_layer_protocol.mode: "direction"
      lists.packet.matches[0].app_layer_protocol.negated: false
# multi value with mode qualifier
- filter:
    filename: rules.json
    count: 1
    match:
      id: 2
      lists.packet.matches[0].app_layer_protocol.protocols: "unknown,tls"
      lists.packet.matches[0].app_layer_protocol.mode: "either"
      lists.packet.matches[0].app_layer_protocol.negated: false
# negated multi value (http umbrella expands to http1/http2)
- filter:
    filename: rules.json
    count: 1
    match:
      id: 3
      lists.packet.matches[0].app_layer_protocol.protocols: "http,tls,http2,http_any"
      lists.packet.matches[0].app_layer_protocol.negated: true
