requires:
  min-version: 8

pcap: ../bug-1045/smtpsuricataflowbitsFN.pcap

args:
  - -k none --set stream.inline=true

checks:
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 13
      alert.signature_id: 1
- filter:
    requires:
      min-version: 8.0.7
    count: 1
    match:
      event_type: smtp
      email.message_id: <alpine.DEB.2.00.1311261630120.9535@sd-26634.dedibox.fr>
      pcap_cnt: 14
# Pre-8.0.7 does not defer tx completion to the server response, so the
# SMTP event lands one packet earlier. Backported to 8.0.7.
- filter:
    requires:
      lt-version: 8.0.7
    count: 1
    match:
      event_type: smtp
      email.message_id: <alpine.DEB.2.00.1311261630120.9535@sd-26634.dedibox.fr>
      pcap_cnt: 13
