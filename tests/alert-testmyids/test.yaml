requires:
  command:
    - xargs

pcap: ../flowbit-oring/input.pcap

checks:

  # Check that we only have one alert event type in eve.
  - filter:
      count: 1
      match:
        event_type: alert

  # Check that alert.engine is not logged when not in firewall mode.
  - filter:
      count: 0
      match:
        has-key: alert.engine

  # Check how many lines were logged to fast.log.
  - shell:
      args: cat fast.log | wc -l | xargs
      expect: 1
