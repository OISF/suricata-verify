requires:
  min-version: 9

pcap: ../../dns/dns-frames/input.pcap

checks:
  - filter:
      count: 0
      match:
        event_type: dns
        proto: TCP
  - filter:
      count: 2
      match:
        event_type: dns
        proto: UDP
  - shell:
      args: |
        grep -q "Warning: app-layer-detect-proto: Inconsistent global (FALSE) and respective ipproto (TRUE) settings found for alproto dns and ipproto udp" stdout
