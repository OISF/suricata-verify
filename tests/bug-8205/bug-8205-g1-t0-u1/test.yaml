requires:
  min-version: 9

pcap: ../../dns/dns-frames/input.pcap

checks:
  - filter:
      count: 2
      match:
        event_type: dns
        proto: UDP
  - filter:
      count: 0
      match:
        event_type: dns
        proto: TCP
  - shell:
      args: |
        grep -q "Warning: app-layer-detect-proto: Inconsistent global (TRUE) and respective ipproto (FALSE) settings found for alproto dns and ipproto tcp" stdout
