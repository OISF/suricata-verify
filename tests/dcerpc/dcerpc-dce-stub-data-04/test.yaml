args:
- -k none --set stream.inline=true

checks:
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 1
      pcap_cnt: 8
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 2
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 2
      pcap_cnt: 12
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 3
- filter:
    count: 1
    match:
      event_type: alert
      alert.signature_id: 3
      pcap_cnt: 16
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: dcerpc
      dcerpc.interfaces[0].service: "winreg"
      dcerpc.interfaces[0].procedure: "OpenLocalMachine"
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: dcerpc
      dcerpc.interfaces[0].service: "winreg"
      dcerpc.interfaces[0].procedure: "BaseRegOpenKey"
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: dcerpc
      dcerpc.interfaces[0].service: "winreg"
      dcerpc.interfaces[0].procedure: "BaseRegSetprocedure"

