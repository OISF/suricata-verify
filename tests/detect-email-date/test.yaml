requires:
  min-version: 8

pcap: ../mime/mime-dec-parse-full-msg-test02/input.pcap

args:
  - -k none --set stream.inline=true

checks:
- filter:
    count: 1
    match:
      event_type: alert
      pcap_cnt: 13
      alert.signature_id: 1
- filter:
    requires:
      min-version: 9
    count: 1
    match:
      event_type: smtp
      email.date: Fri, 21 Apr 2023 05:10:36 +0000
      pcap_cnt: 14
# Pre-9 does not defer tx completion to the server response, so the
# SMTP event lands one packet earlier. Remove when backported to 8.
- filter:
    requires:
      lt-version: 9
    count: 1
    match:
      event_type: smtp
      email.date: Fri, 21 Apr 2023 05:10:36 +0000
      pcap_cnt: 13
