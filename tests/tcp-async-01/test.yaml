args:
- --set stream.midstream=true
- --set stream.async-oneside=true

checks:

  # Check that we only have one alert event type in eve.
  - filter:
      count: 1
      match:
        event_type: alert
        src_port: 143

  - filter:
      count: 1
      match:
        event_type: flow
        dest_port: 143
  - filter:
      requires:
        min-version: 9
      count: 1
      match:
        event_type: stats
        stats.flow.total: 1
        stats.tcp.async_stream: 1
