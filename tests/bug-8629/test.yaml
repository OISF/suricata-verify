requires:
  min-version: 8.0.6

# One-sided (asynchronous) SMB capture: only the client->server direction is
# present, as with asymmetric routing or a one-sided tap. Requests pile up
# waiting for responses that are never seen. When the transaction list passes
# smb.max-tx the parser puts the flow into an error state instead of trying to
# handle it gracefully (issue 8629). max-tx is lowered so a small capture
# reaches the limit.
args:
- -k none
- --set app-layer.protocols.smb.max-tx=3

checks:
  # SMB is parsed up to the limit.
  - filter:
      count: 1
      match:
        event_type: smb
        smb.command: SMB2_COMMAND_NEGOTIATE_PROTOCOL

  # Passing the limit raises the too_many_transactions event once ...
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.app_proto: smb
        anomaly.event: too_many_transactions

  # ... and puts the flow's app-layer parser into an error state.
  - filter:
      count: 1
      match:
        event_type: stats
        stats.app_layer.error.smb.parser: 1
