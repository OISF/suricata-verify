requires:
    min-version: 9

args:
- -k none

checks:
  # For a VLAN-tagged frame the ethernet unknown_ethertype event reports the
  # inner RARP value (0x8035 = 32821), while ether.ether_type is the outer
  # VLAN tag ethertype (0x8100 = 33024).
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.type: decode
        anomaly.event: decoder.ethernet.unknown_ethertype
        anomaly.ether_type: 32821
        ether.ether_type: 33024
  # The VLAN unknown-type event is also raised (without ether_type).
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.type: decode
        anomaly.event: decoder.vlan.unknown_type
