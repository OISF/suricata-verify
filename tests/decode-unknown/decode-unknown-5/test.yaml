requires:
    min-version: 9

args:
- -k none

checks:
  # For an E-Tag frame the ethernet unknown_ethertype event reports the inner
  # RARP value (0x8035 = 32821), while ether.ether_type is the outer E-Tag
  # ethertype (0x893F = 35135).
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.type: decode
        anomaly.event: decoder.ethernet.unknown_ethertype
        anomaly.ether_type: 32821
        ether.ether_type: 35135
  # The E-Tag unknown-type event is also raised (without ether_type).
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.type: decode
        anomaly.event: decoder.etag.unknown_type
