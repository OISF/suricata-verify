requires:
  min-version: 9

pcap: ../detect-pcrexform-01/input.pcap

checks:
  # pcrexform no match -> error_or matches on error
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 1
  # pcrexform matches, content matches -> alert
  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 2
  # pcrexform matches, content does not match -> no alert
  - filter:
      count: 0
      match:
        event_type: alert
        alert.signature_id: 3
