requires:
  min-version: 8.0.6

# After the transaction limit is exceeded, the flow must continue to
# process subsequent commands — the anomaly should not halt parsing.
# Sends a burst of three PWDs with max-tx=1 (two of them trigger the
# limit), then a CWD after a response;
args:
  - -k none --set app-layer.protocols.ftp.max-tx=1

checks:
  # banner, USER, PASS, PWD, PWD, PWD, CWD
  - filter:
      count: 4
      match:
        event_type: ftp

  # We stop parsing after the excess burst
  # So, we do not get CWD
  # And we get only one event with the alert about it
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.event: too_many_transactions

  - filter:
      count: 1
      match:
        event_type: alert
        alert.signature_id: 3
