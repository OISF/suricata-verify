requires:
  min-version: 7

checks:
  - filter:
      # single vlan
      count: 1
      match:
        event_type: flow
        vlan: [6]

  - filter:
      # double-tagged vlan
      count: 1
      match:
        event_type: flow
        vlan: [1, 10]

  - filter:
      # triple-tagged vlan
      count: 1
      match:
        event_type: flow
        vlan: [1, 10, 100]
