requires:
    min-version: 9

args:
- -k none

pcap: ../../decode-unknown-1/input.pcap

checks:
  - filter:
      count: 1
      match:
        event_type: anomaly
        anomaly.type: decode
        anomaly.event: decoder.ethernet.unknown_ethertype
        anomaly.ether_type: "0xfbb7"
        ether.ether_type: 64439
