requires:
  min-version: 9

args:
- -k none

checks:
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 2

# Verify PE metadata is logged in fileinfo events
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.arch: "0x014c"
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.arch_name: x86
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.type: windows_pe
