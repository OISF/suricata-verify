pcap: ../windows-pe-basic/input.pcap

requires:
  min-version: 9

args:
- -k none

checks:
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 1
- filter:
    count: 0
    match:
      event_type: alert
      alert.signature_id: 2
- filter:
    count: 5
    match:
      event_type: alert
      alert.signature_id: 3

# Verify size_of_headers is logged
- filter:
    count: 5
    match:
      event_type: fileinfo
      executable.size_of_headers: 512
