requires:
  min-version: 8
  os: linux
  features:
    - EBPF
files:
  - ebpf/bypass_filter.bpf
  
args:
- --set af-packet.0.xdp-filter-file=${SRCDIR}/ebpf/xdp_filter.bpf
- --set flow-timeouts.tcp.bypassed=100

live-shutdown-after: 5

checks:
  - filter:
      count: 0
      match:
        event_type: stats
        not-has-key: stats.flow_bypassed.pkts
