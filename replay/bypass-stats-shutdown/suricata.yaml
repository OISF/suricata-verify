%YAML 1.1
---

outputs:
  - stats:
      enabled: yes
      filename: stats.log
      append: no
      totals: yes
      threads: no
 
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - stats:
            null-values: false

flow-timeouts:
  tcp:
    bypassed: 100

af-packet:
  - interface: default
    xdp-mode: soft
    bypass: yes
  