requires:
  min-version: 9
  os: linux
  features:
    - EBPF
  files:
    - ebpf/xdp_filter.bpf

args:
  - --set af-packet.0.xdp-filter-file=${SRCDIR}/ebpf/xdp_filter.bpf

tcpreplay_args:
  - -q

live-shutdown-after: 5

checks:
  - filter:
      count: 0
      match:
        event_type: stats
        stats.flow_bypassed.pkts: 0
